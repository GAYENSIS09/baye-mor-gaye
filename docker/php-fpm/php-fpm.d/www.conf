[www]
user = www-data
group = www-data
listen = 9000
listen.owner = www-data
listen.group = www-data
listen.mode = 0660

pm = dynamic
pm.max_children = 10
pm.start_servers = 3
pm.min_spare_servers = 2
pm.max_spare_servers = 5
pm.max_requests = 500

request_terminate_timeout = 300
rlimit_files = 131072
rlimit_core = unlimited

catch_workers_output = yes
clear_env = no

env[APP_ENV] = "production"
env[APP_DEBUG] = "false"