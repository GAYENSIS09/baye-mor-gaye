services:
  nginx:
    image: nginx:alpine
    container_name: portfolio-nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./01-portfolio-laravel:/var/www
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php-fpm
    networks:
      - portfolio

  php-fpm:
    build:
      context: .
      dockerfile: docker/php-fpm/Dockerfile
      target: development
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
        XDEBUG_ENABLED: ${XDEBUG_ENABLED:-true}
    container_name: portfolio-php-fpm
    restart: unless-stopped
    volumes:
      - ./01-portfolio-laravel:/var/www
    environment:
      APP_ENV: local
      APP_DEBUG: false
      APP_URL: http://localhost:8000
      APP_KEY: ${APP_KEY}
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: portfolio
      DB_USERNAME: portfolio
      DB_PASSWORD: portfolio
      SANCTUM_STATEFUL_DOMAINS: localhost:3000
      CORS_ALLOWED_ORIGINS: http://localhost:3000
      CACHE_STORE: database
      FILESYSTEM_DISK: local
      SESSION_DRIVER: cookie
      SESSION_DOMAIN: localhost
      MAIL_MAILER: ${MAIL_MAILER:-smtp}
      MAIL_HOST: ${MAIL_HOST:-smtp.gmail.com}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_ENCRYPTION: ${MAIL_ENCRYPTION:-tls}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS}
      MAIL_FROM_NAME: ${MAIL_FROM_NAME:-Baye Mor Gaye}
      QUEUE_CONNECTION: ${QUEUE_CONNECTION:-sync}
      OLLAMA_URL: ${OLLAMA_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llava}
      PROPRIETAIRE_NOM: ${PROPRIETAIRE_NOM}
      PROPRIETAIRE_EMAIL: ${PROPRIETAIRE_EMAIL}
      PROPRIETAIRE_PASSWORD: ${PROPRIETAIRE_PASSWORD}
      PROPRIETAIRE_TITRE: ${PROPRIETAIRE_TITRE}
      PROPRIETAIRE_BIO: ${PROPRIETAIRE_BIO}
      PROPRIETAIRE_LOCALISATION: ${PROPRIETAIRE_LOCALISATION}
      PROPRIETAIRE_SITE_WEB: ${PROPRIETAIRE_SITE_WEB}
      PROPRIETAIRE_LINKEDIN: ${PROPRIETAIRE_LINKEDIN}
      PROPRIETAIRE_GITHUB: ${PROPRIETAIRE_GITHUB}
      PROPRIETAIRE_PHOTO: ${PROPRIETAIRE_PHOTO}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - portfolio

  workspace:
    build:
      context: .
      dockerfile: docker/workspace/Dockerfile
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    container_name: portfolio-workspace
    restart: unless-stopped
    volumes:
      - ./01-portfolio-laravel:/var/www
    working_dir: /var/www
    tty: true
    stdin_open: true
    environment:
      - APP_ENV=local
    networks:
      - portfolio

  db:
    image: mysql:8.0
    container_name: portfolio-db
    restart: unless-stopped
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: portfolio
      MYSQL_USER: portfolio
      MYSQL_PASSWORD: portfolio
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - portfolio

  frontend:
    build:
      context: ./02-portfolio-nextJS
      dockerfile: ../docker/frontend/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000/api}
        NEXT_PUBLIC_OWNER_NOM: ${NEXT_PUBLIC_OWNER_NOM:-Baye Mor Gaye}
        NEXT_PUBLIC_OWNER_TITRE: ${NEXT_PUBLIC_OWNER_TITRE:-AI &amp; Software Engineer}
    container_name: portfolio-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000/api}
    depends_on:
      - php-fpm
    networks:
      - portfolio

networks:
  portfolio:

volumes:
  db_data:
